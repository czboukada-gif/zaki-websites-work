<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    body{
       font-family: Roboto,arial;
       margin-top: 0px;
       margin-bottom: 0px;
    }
    p {
        font-family: Roboto, Arial;
        margin-top: 0;
        margin-bottom: 0;
      }
    .text-box{
    padding-bottom:5px ;
    padding-top: 5px;
    padding-left:10px ;
    padding-right: 65px ;
    font-size: large;
    display: block;
    margin-bottom: 30px;
   }
   .immg{
    margin-bottom: 12px;
   }
   .img1{
      width: 100%;
   } 
   
   .title{
      margin-top: 0;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      margin-bottom: 12px;
   }
   .discription{
    margin-bottom: 4px;
   }
   .discription , .views{
      font-size: 13px;
      color: rgb(96, 96, 96);
   }
   
   .video-prev{
      width: 300px;
      display: inline-block;
      margin-right: 10px;
      margin-left: 10px;
      vertical-align: top;
   }
   .chan1{
    width: 40px;
    border-radius: 50px;
   }
   .vd-grid{
    display: grid;
    grid-template-columns: 50px 1fr;
   }
   .vd-info , .chan-pic {
    display: inline-block;
   }
  </style>
</head>
<body>
    
<input class="text-box" type="text" placeholder="Search">
  
  
<div class="video-prev">
      <div class="immg">
        <img class="img1" src="pages/img1.webp" >
      </div>
    <div class="vd-grid">
      <div class="chan-pic">
        <img class="chan1" src="pages/chan1.jpeg">
      </div>
      <div class="vd-info">
        <p class="title">
          Talking Tech and AI with Google CEO Sundar Pichai!
        </p>
        <p class="discription">
          Marques Brownlee
        </p>
        <p class="views">
        3.4M views · 6 months ago
        </p>
      </div> 
    </div>   
</div>


<div class="video-prev">
      <div>
        <img class="img1" src="pages/img2.webp" >
      </div>
    <div>
      <div class="chan-pic">
        <img class="chan1" src="pages/chan2.jpeg">
      </div>
      <div class="vd-info">
        <p class="title">
          Try not To Laught Challenge #9
        </p>
        <p class="discription">
          Markipiler
        </p>
        <p class="views">
        19M views · 4 years ago
        </p>
      </div> 
    </div>   
</div>


<div class="video-prev">
      <div>
        <img class="img1" src="pages/img3.webp" >
      </div>
    <div>
      <div class="chan-pic">
        <img class="chan1" src="pages/chan3.jpeg">
      </div>
      <div class="vd-info">
        <p class="title">
          Anything You Can Fit In The
          Circle I’ll Pay For
        </p>
        <p class="discription">
          MrBeast
        </p>
        <p class="views">
        141M views · 1 year ago
        </p>
      </div> 
    </div>   
</div>


</body>
</html>
